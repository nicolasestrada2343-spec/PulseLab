spring.application.name=pulselab

# ── Base de datos H2 (archivo local, persiste entre reinicios) ──
spring.datasource.url=jdbc:h2:file:./data/pulselab;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── Consola web de H2 (http://localhost:8080/h2-console) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Integración de IA (Groq — gratis, modelos Llama, formato compatible con OpenAI) ──
# La key NUNCA se hardcodea: se lee de la variable de entorno GROQ_API_KEY
groq.api.key=${GROQ_API_KEY:}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.api.model=llama-3.3-70b-versatile
